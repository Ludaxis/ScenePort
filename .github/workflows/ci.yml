name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build + freshness
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/sceneport/server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugins/sceneport/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build bundle
        run: node scripts/build.mjs

      - name: Bundle is fresh
        working-directory: .
        run: |
          if ! git diff --quiet -- plugins/sceneport/server/build/ || [ -n "$(git status --porcelain -- plugins/sceneport/server/build/)" ]; then
            echo "::error::Committed build/index.js is stale. Run 'npm run build' in plugins/sceneport/server and commit the result."
            git --no-pager diff -- plugins/sceneport/server/build/
            exit 1
          fi

  test:
    name: Vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/sceneport/server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugins/sceneport/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: plugins/sceneport/server/coverage
          if-no-files-found: ignore

  version-sync:
    name: Version sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check versions are in sync
        run: node scripts/sync-versions.mjs --check

  plugin-shape:
    name: Plugin shape
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required plugin files
        run: |
          test -f plugins/sceneport/.codex-plugin/plugin.json
          test -f plugins/sceneport/.claude-plugin/plugin.json
          test -f plugins/sceneport/.mcp.json
          test -f plugins/sceneport/server/build/index.js
          test -f plugins/sceneport/unity-package/package.json

      - name: Check generated placeholders
        run: |
          # Scan generated/doc content for unfilled placeholders. Exclude .github so this
          # grep does not match its own pattern in the workflow file.
          if grep -R "\[TODO:" -n . --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.github; then
            echo "Found TODO placeholders"
            exit 1
          fi

  unity-tests:
    name: Unity EditMode tests
    runs-on: ubuntu-latest
    needs: build
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require Unity license
        if: env.UNITY_LICENSE == ''
        run: |
          echo "::error::UNITY_LICENSE secret is required for mandatory ScenePort Unity EditMode tests."
          exit 1

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: TestProjects/BridgeHarness/Library
          key: unity-library-${{ hashFiles('TestProjects/BridgeHarness/Packages/manifest.json') }}

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: TestProjects/BridgeHarness
          testMode: editmode
          unityVersion: 2022.3.62f3

      - name: Upload Unity test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-editmode-results
          path: artifacts
          if-no-files-found: ignore
