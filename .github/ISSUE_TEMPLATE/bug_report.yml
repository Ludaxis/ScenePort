name: Bug report
description: Report a ScenePort issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Unity version, OS, Codex/Claude Code client, Node version.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant ScenePort, MCP, or Unity console output.
      render: text
