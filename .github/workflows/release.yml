name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Verify and release
    runs-on: ubuntu-latest
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugins/sceneport/server/package-lock.json

      - name: Guard tag matches version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./plugins/sceneport/server/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match server package.json version $PKG"
            exit 1
          fi
          node scripts/sync-versions.mjs --check
          node scripts/check-trust-contract.mjs

      - name: Install, verify, build
        working-directory: plugins/sceneport/server
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run test:coverage
          node scripts/build.mjs

      - name: Bundle is fresh
        run: git diff --exit-code -- plugins/sceneport/server/build/

      - name: Check plugin shape
        run: |
          test -f plugins/sceneport/.codex-plugin/plugin.json
          test -f plugins/sceneport/.claude-plugin/plugin.json
          test -f plugins/sceneport/.mcp.json
          test -f plugins/sceneport/server/build/index.js
          test -f plugins/sceneport/unity-package/package.json

      - name: Skip when no Unity license
        if: env.UNITY_LICENSE == ''
        run: |
          echo "::warning::UNITY_LICENSE secret not set — skipping Unity EditMode tests for this release."
          echo "Set UNITY_LICENSE (and UNITY_EMAIL/UNITY_PASSWORD for a Personal license) to gate releases on Unity tests."

      - name: Cache Unity Library
        if: env.UNITY_LICENSE != ''
        uses: actions/cache@v4
        with:
          path: TestProjects/BridgeHarness/Library
          key: release-unity-library-${{ hashFiles('TestProjects/BridgeHarness/Packages/manifest.json') }}

      - name: Run Unity EditMode tests
        if: env.UNITY_LICENSE != ''
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: TestProjects/BridgeHarness
          testMode: editmode
          unityVersion: 2022.3.62f3

      - name: Upload Unity test results
        if: always() && env.UNITY_LICENSE != ''
        uses: actions/upload-artifact@v4
        with:
          name: unity-editmode-results
          path: artifacts
          if-no-files-found: ignore

      - name: Pack Unity package tarball
        working-directory: plugins/sceneport/unity-package
        run: npm pack

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const md = fs.readFileSync('CHANGELOG.md', 'utf8');
            const escaped = process.argv[1].replace(/\\./g, '\\\\.');
            const re = new RegExp('(?:^|\\n)##\\\\s+(?:\\\\[' + escaped + '\\\\]|' + escaped + ')(?:[ \\t].*)?\\n([\\s\\S]*?)(?=\\n##\\\\s+|$)');
            const m = md.match(re);
            fs.writeFileSync('RELEASE_NOTES.md', (m ? m[1] : 'See CHANGELOG.md').trim() + '\n');
          " "$VERSION"
          cat RELEASE_NOTES.md

      - name: Collect release evidence
        run: node scripts/collect-release-evidence.mjs

      - name: Append release evidence to notes
        run: |
          printf "\n\n---\n\n" >> RELEASE_NOTES.md
          cat RELEASE_EVIDENCE.md >> RELEASE_NOTES.md

      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: RELEASE_EVIDENCE.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: plugins/sceneport/unity-package/*.tgz
